name: Release packages

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: Release tag to create, for example v0.2.0
        required: true
        type: string

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always
  RELEASE_TAG: ${{ inputs.tag || github.ref_name }}

jobs:
  verify:
    name: Verify release source
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - run: cargo fmt --check
      - run: cargo test --all-targets
      - run: cargo clippy --all-targets -- -D warnings
      - run: cargo package --no-verify

  linux-ubuntu:
    name: Package Linux Ubuntu x86_64
    needs: verify
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - run: cargo build --release
      - name: Create archive
        run: |
          mkdir -p dist
          tar -C target/release -czf "dist/openconnect-vpn-gui_${RELEASE_TAG}_linux-ubuntu-x86_64.tar.gz" openconnect-vpn-gui
      - uses: actions/upload-artifact@v4
        with:
          name: package-linux-ubuntu-x86_64
          path: dist/*.tar.gz
          if-no-files-found: error

  linux-distro:
    name: Package Linux ${{ matrix.distro }} x86_64
    needs: verify
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - distro: archlinux
            image: archlinux:base-devel
            install: pacman -Syu --needed --noconfirm git rust pkgconf libx11 libxcb libxkbcommon wayland mesa
          - distro: fedora
            image: fedora:latest
            install: dnf install -y git rust cargo gcc pkgconf-pkg-config libX11-devel libxcb-devel libxkbcommon-devel wayland-devel mesa-libEGL-devel
          - distro: void
            image: ghcr.io/void-linux/void-glibc-full:latest
            install: xbps-install -Syu xbps && xbps-install -Syu && xbps-install -y git rust cargo gcc pkg-config libX11-devel libxcb-devel libxkbcommon-devel wayland-devel MesaLib-devel
    container:
      image: ${{ matrix.image }}
    steps:
      - name: Install build dependencies
        run: ${{ matrix.install }}
      - uses: actions/checkout@v4
      - run: cargo build --release
      - name: Create archive
        run: |
          mkdir -p dist
          tar -C target/release -czf "dist/openconnect-vpn-gui_${RELEASE_TAG}_linux-${{ matrix.distro }}-x86_64.tar.gz" openconnect-vpn-gui
      - uses: actions/upload-artifact@v4
        with:
          name: package-linux-${{ matrix.distro }}-x86_64
          path: dist/*.tar.gz
          if-no-files-found: error

  windows:
    name: Package Windows x86_64
    needs: verify
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - run: cargo build --release
      - name: Create archive
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force dist | Out-Null
          Compress-Archive -Path target/release/openconnect-vpn-gui.exe -DestinationPath "dist/openconnect-vpn-gui_${env:RELEASE_TAG}_windows-x86_64.zip"
      - uses: actions/upload-artifact@v4
        with:
          name: package-windows-x86_64
          path: dist/*.zip
          if-no-files-found: error

  macos-universal:
    name: Package macOS universal
    needs: verify
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-darwin,x86_64-apple-darwin
      - run: cargo build --release --target aarch64-apple-darwin
      - run: cargo build --release --target x86_64-apple-darwin
      - name: Create archive
        run: |
          mkdir -p dist/universal
          lipo -create -output dist/universal/openconnect-vpn-gui \
            target/aarch64-apple-darwin/release/openconnect-vpn-gui \
            target/x86_64-apple-darwin/release/openconnect-vpn-gui
          tar -C dist/universal -czf "dist/openconnect-vpn-gui_${RELEASE_TAG}_macos-universal.tar.gz" openconnect-vpn-gui
      - uses: actions/upload-artifact@v4
        with:
          name: package-macos-universal
          path: dist/*.tar.gz
          if-no-files-found: error

  freebsd:
    name: Package FreeBSD x86_64
    needs: verify
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-unknown-freebsd
      - uses: taiki-e/install-action@cross
      - run: cross build --release --target x86_64-unknown-freebsd
      - name: Create archive
        run: |
          mkdir -p dist
          tar -C target/x86_64-unknown-freebsd/release -czf "dist/openconnect-vpn-gui_${RELEASE_TAG}_freebsd-x86_64.tar.gz" openconnect-vpn-gui
      - uses: actions/upload-artifact@v4
        with:
          name: package-freebsd-x86_64
          path: dist/*.tar.gz
          if-no-files-found: error

  release:
    name: Publish GitHub release
    needs: [linux-ubuntu, linux-distro, windows, macos-universal, freebsd]
    runs-on: ubuntu-latest
    steps:
      - name: Download packages
        uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true
      - name: Generate checksums
        run: |
          cd dist
          sha256sum *.tar.gz *.zip > SHA256SUMS
      - name: Publish release and packages
        uses: softprops/action-gh-release@v2.6.2
        with:
          tag_name: ${{ env.RELEASE_TAG }}
          target_commitish: ${{ github.sha }}
          name: OpenConnect VPN GUI ${{ env.RELEASE_TAG }}
          generate_release_notes: true
          files: |
            dist/*.tar.gz
            dist/*.zip
            dist/SHA256SUMS
